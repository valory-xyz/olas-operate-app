name: Release for Windows

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      tag:
        description: "Tag name to build (e.g., v1.2.3-rc1)"
        required: true
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - env: "production"
            OPTIMISM_RPC: "https://rpc-gate.autonolas.tech/optimism-rpc/"
            BASE_RPC: "https://rpc-gate.autonolas.tech/base-rpc/"
            GNOSIS_RPC: "https://rpc-gate.autonolas.tech/gnosis-rpc/"
            ETHEREUM_RPC: "https://rpc-gate.autonolas.tech/ethereum-rpc/"
            MODE_RPC: "https://mainnet.mode.network"
            POLYGON_RPC: "https://rpc-gate.autonolas.tech/polygon-rpc/"
            CELO_RPC: "https://forno.celo.org"
            arch: "x64"
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      # Set up Python with setup-python action and add it to PATH
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        id: setup-python
        with:
          python-version: "3.14"

      - name: Add Python to PATH
        run: |
          echo "${{ steps.setup-python.outputs.python-path }}" >> $GITHUB_PATH

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.18"
          registry-url: "https://registry.npmjs.org"

      - name: Activate pinned Yarn via Corepack
        run: |
          corepack enable
          # Read the full integrity-verified spec from package.json so corepack
          # checks the sha512 hash. Plain `corepack prepare yarn@1.22.22 --activate`
          # downloads from npm without verifying against the hash.
          PM_SPEC=$(node -p "require('./package.json').packageManager")
          corepack prepare "$PM_SPEC" --activate

      - name: Verify Yarn version
        run: |
          yarn --version
          test "$(yarn --version)" = "1.22.22" || (echo "::error::Yarn version mismatch" && exit 1)

      # Configure Yarn network settings for timeout, retries, and reduced concurrency
      - name: Configure Yarn network settings
        run: |
          yarn config set network-timeout 60000         # Set network timeout to 1 minute
          yarn config set network-retries 10             # Retry up to 10 times
          yarn config set network-concurrency 2          # Reduce concurrency to 2 connections
          
      - name: Install and configure Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          version: "2.3.2"
          virtualenvs-create: true
          virtualenvs-in-project: false
          virtualenvs-path: ~/my-custom-path
          installer-parallel: true

      # INSTALL PROJECT DEPENDENCIES

      - name: Restore middleware venv cache
        id: cache-middleware-venv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/my-custom-path
          key: middleware-venv-${{ runner.os }}-${{ matrix.arch }}-${{ matrix.env }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
          
      - name: Install Poetry dependencies (if venv cache miss)
        if: steps.cache-middleware-venv.outputs.cache-hit != 'true'
        run: yarn install:backend

      # Cache electron node_modules with unique key for each environment and architecture
      - name: Restore electron node_modules cache
        id: cache-electron-node-modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: electron-node-modules-v2-${{ runner.os }}-${{ matrix.arch }}-${{ matrix.env }}-${{ hashFiles('yarn.lock', '.github/workflows/release_win.yml') }}
    
      # Guard against stale absolute symlinks from previously cached node_modules.
      - name: Validate cached electron node_modules
        id: validate-electron-node-modules
        if: steps.cache-electron-node-modules.outputs.cache-hit == 'true'
        run: |
          dangling_link=$(find node_modules -type l ! -exec test -e {} \; -print -quit 2>/dev/null || true)

          if [ -n "$dangling_link" ]; then
            echo "::warning::Detected dangling symlink in cached node_modules: $dangling_link"
            rm -rf node_modules
            echo "is-valid=false" >> "$GITHUB_OUTPUT"
          else
            echo "is-valid=true" >> "$GITHUB_OUTPUT"
          fi

      # Install electron dependencies if cache miss or cached tree is invalid.
      - name: Install electron dependencies
        if: steps.cache-electron-node-modules.outputs.cache-hit != 'true' || steps.validate-electron-node-modules.outputs.is-valid != 'true'
        run: yarn install --frozen-lockfile --check-files
    
      # Cache frontend node_modules with unique key for each environment and architecture
      - name: Restore frontend node_modules cache
        id: cache-frontend-node-modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: frontend/node_modules
          key: frontend-node-modules-${{ runner.os }}-${{ matrix.arch }}-${{ matrix.env }}-${{ hashFiles('frontend/yarn.lock') }}
    
      # Install frontend dependencies if cache miss
      - name: Install frontend dependencies
        if: steps.cache-frontend-node-modules.outputs.cache-hit != 'true'
        run: yarn install:frontend
        

      - name: Setup Certificate 
        run: | 
          echo "${{secrets.SM_CLIENT_CERT_FILE_B64 }}" | base64 --decode > /d/Certificate_pkcs12.p12 
        shell: bash             

      - name: Set variables 
        id: variables 
        run: | 
          VERSION='${{ inputs.tag }}'
          VERSION_NO_V=${VERSION#v}
          echo "version=$VERSION_NO_V" >> $GITHUB_OUTPUT 
          echo "SM_HOST=${{ secrets.SM_HOST }}" >> "$GITHUB_ENV" 
          echo "SM_API_KEY=${{ secrets.SM_API_KEY }}" >> "$GITHUB_ENV" 

          if [[ -n $(echo -n "${{ inputs.tag }}"|egrep "\-(ga|ea|release|signed)$") ]]; then
            echo "${{ inputs.tag }} is a release tag! enable signature support"
            echo "SM_KEY_PAIR_ALIAS=${{ secrets.SM_KEY_PAIR_ALIAS }}" >> "$GITHUB_ENV" 
          else
            echo "${{ inputs.tag }} is a NOT release tag! disable signature support"
          fi
          
          echo "SM_CLIENT_CERT_FILE=D:\\Certificate_pkcs12.p12" >> "$GITHUB_ENV" 
          echo "SM_CLIENT_CERT_PASSWORD=${{ secrets.SM_CLIENT_CERT_PASSWORD }}" >> "$GITHUB_ENV" 
          echo "C:\Program Files (x86)\Windows Kits\10\App Certification Kit" >> $GITHUB_PATH 
          echo "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools" >> $GITHUB_PATH 
          echo "C:\Program Files\DigiCert\DigiCert One Signing Manager Tools" >> $GITHUB_PATH 
        shell: bash  

      - name: Setup SSM KSP on windows latest 
        run: | 
          curl -X GET  https://one.digicert.com/signingmanager/api-ui/v1/releases/smtools-windows-x64.msi/download -H "x-api-key:%SM_API_KEY%" -o smtools-windows-x64.msi 
          msiexec /i smtools-windows-x64.msi /quiet /qn 
          smksp_registrar.exe list 
          smctl.exe keypair ls 
          C:\Windows\System32\certutil.exe -csp "DigiCert Signing Manager KSP" -key -user 
          smksp_cert_sync.exe 

        shell: cmd 
      - name: set env vars to prod.env
        env:
          NODE_ENV: ${{ matrix.env }}          
          GNOSIS_RPC: ${{ matrix.GNOSIS_RPC }}
          BASE_RPC: ${{ matrix.BASE_RPC }}
          ETHEREUM_RPC: ${{ matrix.ETHEREUM_RPC }}
          OPTIMISM_RPC: ${{ matrix.OPTIMISM_RPC }}
          MODE_RPC: ${{ matrix.MODE_RPC }}
          POLYGON_RPC: ${{ matrix.POLYGON_RPC }}
          CELO_RPC: ${{ matrix.CELO_RPC }}
          IS_STAGING: ${{ github.ref != 'refs/heads/main' && 'true' || 'false' }}
          GH_TOKEN: ${{ secrets.github_token}}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          echo NODE_ENV=$NODE_ENV >> prod.env
          echo IS_STAGING=$IS_STAGING >> prod.env
          echo OPTIMISM_RPC=$OPTIMISM_RPC >> prod.env
          echo BASE_RPC=$BASE_RPC >> prod.env
          echo ETHEREUM_RPC=$ETHEREUM_RPC >> prod.env
          echo GNOSIS_RPC=$GNOSIS_RPC >> prod.env
          echo MODE_RPC=$MODE_RPC >> prod.env
          echo POLYGON_RPC=$POLYGON_RPC >> prod.env
          echo CELO_RPC=$CELO_RPC >> prod.env
          cat prod.env
          echo GH_TOKEN=$GH_TOKEN >> prod.env
      - run: rm -rf /dist
      - name: "Build, notarize, publish"
        env:
          PUBLISH_FOR_PULL_REQUEST: true
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          export GITHUB_REF_TYPE="tag"
          export GITHUB_REF_NAME="${RELEASE_TAG}"
          export GITHUB_REF="refs/tags/${RELEASE_TAG}"
          make build
