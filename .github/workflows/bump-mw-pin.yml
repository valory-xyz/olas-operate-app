name: Bump MW pin on feature branches

on:
  repository_dispatch:
    types: [mw-released]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        branch: ${{ github.event.client_payload.branches }}
    concurrency:
      group: bump-mw-pin-${{ matrix.branch }}
      cancel-in-progress: false
    steps:
      - name: Check if branch exists on this repo
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api "repos/${{ github.repository }}/branches/${{ matrix.branch }}" --silent 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Branch '${{ matrix.branch }}' does not exist on ${{ github.repository }}; skipping."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout branch
        if: steps.check.outputs.exists == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 1

      - name: Setup Python
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install uv
        if: steps.check.outputs.exists == 'true'
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          version: "0.11.15"

      - name: Configure git identity
        if: steps.check.outputs.exists == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump MW pin to released version
        if: steps.check.outputs.exists == 'true'
        # `calculate-and-update-version.yml` writes a
        # `[tool.uv.sources]` git entry when pinning to an rc; `uv add
        # "<pkg>==X.Y.Z"` does NOT strip that source, so the git rev
        # keeps overriding the version pin. Explicit `uv remove` first
        # drops the source, then the versioned `uv add` reintroduces
        # the package as a plain version pin.
        run: |
          uv remove olas-operate-middleware
          uv add "olas-operate-middleware==${{ github.event.client_payload.version }}"
          git diff pyproject.toml uv.lock || true

      - name: Commit and push if changed
        if: steps.check.outputs.exists == 'true'
        run: |
          if git diff --quiet pyproject.toml uv.lock; then
            echo "No change to pyproject.toml or uv.lock; nothing to commit."
            exit 0
          fi
          git add pyproject.toml uv.lock
          git commit -m "chore: bump olas-operate-middleware to ${{ github.event.client_payload.version }}"
          git push origin "${{ matrix.branch }}"
