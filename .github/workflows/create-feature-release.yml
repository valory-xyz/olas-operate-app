name: Create Feature Release
permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to create release from'
        required: true
        type: string
      action:
        description: 'Action'
        required: true
        type: choice
        options:
          - new
          - override
        default: 'new'

jobs:
  # Override deletes-and-recreates the tag at v$(package.json version), which
  # reattaches it to a new commit and lets electron-builder rewrite the
  # corresponding GitHub Release. If that release was already published it
  # would be silently overwritten — including its Latest marker. Compute the
  # release tag from package.json on the target branch so the guard can
  # short-circuit before any destructive work.
  compute-release-tag:
    if: inputs.action == 'override'
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.compute-tag.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Compute release tag from package.json
        id: compute-tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "release_tag=v${PACKAGE_VERSION}" | tee -a $GITHUB_OUTPUT

  check-release-not-published:
    if: inputs.action == 'override'
    needs: compute-release-tag
    uses: ./.github/workflows/check-release-not-published.yml
    with:
      release_tag: ${{ needs.compute-release-tag.outputs.release_tag }}
    secrets: inherit

  calculate-version:
    needs: [compute-release-tag, check-release-not-published]
    # On `action=override`: both the tag computation and the guard must
    # succeed — if either fails, the destructive override path must not
    # proceed. On `action=new`: both jobs are skipped (their own `if`
    # gates them on override), so allow that combination through.
    if: >-
      ${{ always() && (
        (inputs.action == 'override'
          && needs.compute-release-tag.result == 'success'
          && needs.check-release-not-published.result == 'success')
        || (inputs.action == 'new'
          && needs.compute-release-tag.result == 'skipped'
          && needs.check-release-not-published.result == 'skipped')
      ) }}
    uses: ./.github/workflows/calculate-and-update-version.yml
    with:
      branch: ${{ inputs.branch }}
      version_strategy: ${{ inputs.action == 'new' && 'increment' || 'override' }}
    secrets: inherit

  # `calculate-version` uses `if: always() && ...` so it can run when its
  # guards are skipped (action=new). GitHub Actions propagates that "skipped
  # ancestor" through the implicit `success()` default of dependents — they
  # silently skip even though `calculate-version` itself succeeded. Each
  # release job below must therefore opt back in explicitly.
  run-release:
    needs: calculate-version
    if: ${{ needs.calculate-version.result == 'success' }}
    uses: ./.github/workflows/release_mac.yml
    with:
      tag: ${{ needs.calculate-version.outputs.new_tag }}
    secrets: inherit

  run-release-win:
    needs: calculate-version
    if: ${{ needs.calculate-version.result == 'success' }}
    uses: ./.github/workflows/release_win.yml
    with:
      tag: ${{ needs.calculate-version.outputs.new_tag }}
    secrets: inherit

  run-release-linux:
    needs: calculate-version
    if: ${{ needs.calculate-version.result == 'success' }}
    uses: ./.github/workflows/release_linux.yml
    with:
      tag: ${{ needs.calculate-version.outputs.new_tag }}
    secrets: inherit

  merge-latest-mac-yml:
    needs: [calculate-version, run-release]
    if: ${{ needs.calculate-version.result == 'success' && needs.run-release.result == 'success' }}
    uses: ./.github/workflows/merge-latest-mac-yml.yml
    with:
      tag: ${{ needs.calculate-version.outputs.new_tag }}
    secrets: inherit

  summary:
    needs: [calculate-version, run-release, run-release-win, run-release-linux, merge-latest-mac-yml]
    if: >-
      ${{ needs.calculate-version.result == 'success'
        && needs.run-release.result == 'success'
        && needs.run-release-win.result == 'success'
        && needs.run-release-linux.result == 'success'
        && needs.merge-latest-mac-yml.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create summary
        run: |
          echo "## Release Created Successfully :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ needs.calculate-version.outputs.new_tag }}" >> $GITHUB_STEP_SUMMARY