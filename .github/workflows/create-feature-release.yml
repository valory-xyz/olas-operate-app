name: Create Feature Release
permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to create release from'
        required: true
        type: string
      action:
        description: 'Action'
        required: true
        type: choice
        options:
          - new
          - override
        default: 'new'

jobs:
  calculate-version:
    uses: ./.github/workflows/calculate-and-update-version.yml
    with:
      branch: ${{ inputs.branch }}
      version_strategy: ${{ inputs.action == 'new' && 'increment' || 'override' }}
    secrets: inherit

  run-release:
    needs: calculate-version
    uses: ./.github/workflows/release_mac.yml
    with:
      tag: ${{ needs.calculate-version.outputs.new_tag }}
    secrets: inherit

  run-release-win:
    needs: calculate-version
    uses: ./.github/workflows/release_win.yml
    with:
      tag: ${{ needs.calculate-version.outputs.new_tag }}
    secrets: inherit

  run-release-linux:
    needs: calculate-version
    uses: ./.github/workflows/release_linux.yml
    with:
      tag: ${{ needs.calculate-version.outputs.new_tag }}
    secrets: inherit

  merge-latest-mac-yml:
    needs: [calculate-version, run-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.calculate-version.outputs.new_tag }}

      - name: Download arm64 yml
        uses: actions/download-artifact@v4
        with:
          name: latest-mac-yml-arm64
          path: yml-arm64
        continue-on-error: true

      - name: Download x64 yml
        uses: actions/download-artifact@v4
        with:
          name: latest-mac-yml-x64
          path: yml-x64
        continue-on-error: true

      - name: Merge latest-mac.yml
        run: bash scripts/merge-latest-mac-yml.sh yml-arm64/latest-mac.yml yml-x64/latest-mac.yml latest-mac.yml

      - name: Upload merged latest-mac.yml to release
        if: hashFiles('latest-mac.yml') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete-asset "${{ needs.calculate-version.outputs.new_tag }}" latest-mac.yml --yes 2>/dev/null || true
          gh release upload "${{ needs.calculate-version.outputs.new_tag }}" latest-mac.yml --clobber

  summary:
    needs: [calculate-version, run-release, run-release-win, run-release-linux, merge-latest-mac-yml]
    runs-on: ubuntu-latest
    steps:
      - name: Create summary
        run: |
          echo "## Release Created Successfully :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ needs.calculate-version.outputs.new_tag }}" >> $GITHUB_STEP_SUMMARY